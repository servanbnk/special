<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Özel...</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050508;
            font-family: 'Montserrat', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Arka Plan Yıldız Tozları */
        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* --- 1. EKRAN: PARMAK İZİ TARAYICI --- */
        #scanner-screen {
            position: absolute;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease, transform 1s ease;
        }

        .scanner-text {
            font-size: 1.2rem;
            font-weight: 300;
            color: #d4b3ff;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 179, 255, 0.5);
            text-align: center;
        }

        #fingerprint-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(212, 179, 255, 0.05);
            border: 2px solid #d4b3ff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212, 179, 255, 0.2), inset 0 0 15px rgba(212, 179, 255, 0.2);
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
            user-select: none;
        }

        #fingerprint-btn:active {
            transform: scale(0.95);
            background: rgba(212, 179, 255, 0.2);
            box-shadow: 0 0 40px rgba(212, 179, 255, 0.6), inset 0 0 30px rgba(212, 179, 255, 0.4);
        }

        .instruction {
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 179, 255, 0.2); }
            50% { box-shadow: 0 0 40px rgba(212, 179, 255, 0.5); }
        }

        /* --- 2. EKRAN: SOYUT SEÇİM KARTLARI --- */
        #selection-screen {
            position: absolute;
            z-index: 5;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 800px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        .header-text {
            font-size: 1.5rem;
            font-weight: 300;
            text-align: center;
            margin-bottom: 40px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        .header-text span {
            color: #d4b3ff;
            font-weight: 600;
        }

        .cards-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .card {
            background: rgba(20, 15, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 179, 255, 0.3);
            border-radius: 15px;
            padding: 40px 20px;
            width: 200px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #d4b3ff;
            box-shadow: 0 15px 40px rgba(212, 179, 255, 0.3);
            background: rgba(40, 30, 60, 0.8);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #e6ccff;
            letter-spacing: 1px;
        }

        .card-desc {
            font-size: 0.85rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
        }

        /* --- MODAL (Şiir Ekranı) --- */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 5, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .modal-content {
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .poem-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #ffffff;
            line-height: 1.8;
            text-shadow: 0 0 20px rgba(212, 179, 255, 0.4);
            white-space: pre-line; /* Şiirdeki satır atlamalarını korur */
        }

        .close-hint {
            margin-top: 40px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .cards-container { flex-direction: column; align-items: center; }
            .card { width: 70%; padding: 30px; }
            .header-text { font-size: 1.2rem; }
            .poem-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <!-- Arka plan animasyonu -->
    <canvas id="canvas-bg"></canvas>

    <!-- 1. EKRAN -->
    <div id="scanner-screen">
        <div class="scanner-text" id="status-text">BİR İZ BIRAK...</div>
        <div id="fingerprint-btn">👆</div>
        <div class="instruction">Parmak izini okut.</div>
    </div>

    <!-- 2. EKRAN -->
    <div id="selection-screen">
        <div class="header-text">
            Sıradan olan her şeyi geride bıraktık.<br>
            Şimdi <span>sadece hissetmeni</span> istiyorum...<br>
            Hangisi seni çağırıyor?
        </div>
        
        <div class="cards-container">
            <!-- Seçenek 1 -->
            <div class="card" onclick="selectOption('gokyuzu')">
                <div class="card-icon">🌌</div>
                <div class="card-title">Gökyüzü</div>
                <div class="card-desc">Sadece yukarı bak...</div>
            </div>
            
            <!-- Seçenek 2 -->
            <div class="card" onclick="selectOption('deniz')">
                <div class="card-icon">🌊</div>
                <div class="card-title">Deniz</div>
                <div class="card-desc">Sadece dinle...</div>
            </div>

            <!-- Seçenek 3 -->
            <div class="card" onclick="selectOption('zaman')">
                <div class="card-icon">⏳</div>
                <div class="card-title">Zaman</div>
                <div class="card-desc">Sadece durdur...</div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal">
        <div class="modal-content">
            <div class="poem-text" id="poem-msg"></div>
            <div class="close-hint">Kapatmak için dokun</div>
        </div>
    </div>

    <script>
        // --- ARKA PLAN YILDIZ TOZLARI ---
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.7 + 0.1;
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                if (this.y < 0) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(212, 179, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- EKRAN GEÇİŞLERİ ---
        const scannerScreen = document.getElementById('scanner-screen');
        const selectionScreen = document.getElementById('selection-screen');
        const fpBtn = document.getElementById('fingerprint-btn');
        const statusText = document.getElementById('status-text');

        fpBtn.addEventListener('click', () => {
            statusText.innerText = "HİSSEDİLİYOR...";
            statusText.style.color = "#ffffff";
            fpBtn.style.animation = "none";
            fpBtn.style.transform = "scale(1.1)";
            fpBtn.style.borderColor = "#ffffff";
            fpBtn.style.boxShadow = "0 0 50px rgba(255,255,255,0.8)";

            setTimeout(() => {
                scannerScreen.style.opacity = '0';
                scannerScreen.style.transform = 'scale(1.2)';
                
                setTimeout(() => {
                    scannerScreen.style.display = 'none';
                    selectionScreen.style.display = 'flex';
                    
                    setTimeout(() => {
                        selectionScreen.style.opacity = '1';
                        selectionScreen.style.transform = 'translateY(0)';
                    }, 100);
                }, 1000);
            }, 1500); 
        });

        // --- KART SEÇİMİ VE ŞİİRLER ---
        const modal = document.getElementById('modal');
        const poemMsg = document.getElementById('poem-msg');

        function selectOption(choice) {
            let poem = "";
            
            if(choice === 'gokyuzu') {
                poem = "Gecenin en karanlık vaktinde,\nBir yıldız kayar sessizce.\nBen dilek tutmayı çoktan bıraktım,\nSenin gözlerine daldığımdan beri.";
            } else if(choice === 'deniz') {
                poem = "Kıyıya vuran her dalga,\nBana senin sesini fısıldar.\nUçsuz bucaksız bir denizin ortasında,\nBulduğum tek sığınak ellerindir.";
            } else if(choice === 'zaman') {
                poem = "Akıp giden zamana inat,\nGözlerinde durdurmak var hayatı.\nBir saniye, bir ömür gibi,\nYanında geçen her an paha biçilmez.";
            }

            poemMsg.innerHTML = poem;
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.style.opacity = '1';
            }, 50);
        }

        // Modalı kapatmak için boşluğa tıklama
        modal.addEventListener('click', () => {
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.style.display = 'none';
            }, 500);
        });
    </script>
</body>
</html>
