<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Özel...</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Montserrat', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Başlangıçtaki Gizemli Çember Buton */
        #interactive-btn {
            position: absolute;
            z-index: 10;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid rgba(255, 0, 102, 0.5);
            color: #ffb3c6;
            font-size: 1rem;
            font-weight: 300;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.5s ease;
            box-shadow: 0 0 30px rgba(255, 0, 102, 0.2), inset 0 0 20px rgba(255, 0, 102, 0.2);
            animation: breathe 3s infinite ease-in-out;
            backdrop-filter: blur(5px);
        }

        #interactive-btn:hover {
            border-color: rgba(255, 0, 102, 1);
            box-shadow: 0 0 50px rgba(255, 0, 102, 0.6), inset 0 0 30px rgba(255, 0, 102, 0.4);
            transform: scale(1.05);
            color: white;
            text-shadow: 0 0 10px #ff0066;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 0, 102, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 0, 102, 0.5); }
        }

        .hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* Sticker ve Metin Alanı */
        #sticker-container {
            position: absolute;
            top: 65%; 
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 3s ease; 
        }

        .sticker-img {
            width: 180px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 0, 102, 0.3);
            animation: floatSticker 4s ease-in-out infinite;
        }

        .sticker-text {
            font-size: 1.2rem;
            font-weight: 300;
            color: #ffb3c6;
            margin-top: 20px;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255, 179, 198, 0.6);
        }

        @keyframes floatSticker {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <button id="interactive-btn">Dokun<br>Bana</button>
    <div class="hint" id="hint">Ekrandaki yazıları silmek için fareyi/parmağını üzerinde gezdir...</div>
    
    <!-- Sticker ve Flörtöz Mesaj Overlay'i -->
    <div id="sticker-container">
        <!-- Resim linki buraya eklendi -->
        <img src="https://i.ibb.co/MxPHD3mY/Sticker00-04-07.jpg" alt="Biz" class="sticker-img">
        <div class="sticker-text">Çünkü bir gün tam olarak buna dönüşeceğimizi<br>ikimiz de çok iyi biliyoruz... 🤏😊</div>
    </div>

    <canvas id="canvas-container"></canvas>

    <script>
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const btn = document.getElementById('interactive-btn');
        const hint = document.getElementById('hint');
        const stickerContainer = document.getElementById('sticker-container');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        let isRevealed = false;

        let mouse = {
            x: null,
            y: null,
            radius: 150
        }

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('touchmove', function(event) {
            mouse.x = event.touches[0].clientX;
            mouse.y = event.touches[0].clientY;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        window.addEventListener('touchend', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        class Particle {
            constructor(x, y, color) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.destX = x;
                this.destY = y;
                this.size = Math.random() * 2 + 1;
                this.color = color;
                
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.friction = Math.random() * 0.05 + 0.89;
                this.ease = Math.random() * 0.02 + 0.01;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                if (this.size <= 0.2) return; 

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < mouse.radius) {
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    
                    this.x -= forceDirectionX * 15; 
                    this.y -= forceDirectionY * 15;
                    this.size -= 0.2; 
                } else {
                    this.x += (this.destX - this.x) * this.ease;
                    this.y += (this.destY - this.y) * this.ease;
                }
                
                if (this.size > 0.2) {
                    this.draw();
                }
            }
        }

        function initParticles() {
            particlesArray = [];
            
            let text1 = "Merakına yenik düştün...";
            let text2 = "Peki ilk adımı kim atacak? 🍷";

            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            
            let fontSize = Math.min(canvas.width / 15, 50);
            ctx.font = `300 ${fontSize}px Montserrat`;
            ctx.fillText(text1, canvas.width / 2, canvas.height / 2 - 100);
            
            ctx.font = `600 ${fontSize * 0.8}px Montserrat`;
            ctx.fillText(text2, canvas.width / 2, canvas.height / 2 - 30);

            const textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let step = 4; 
            for (let y = 0; y < textCoordinates.height; y += step) {
                for (let x = 0; x < textCoordinates.width; x += step) {
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128) {
                        let posX = x;
                        let posY = y;
                        let colors = ['#ff0066', '#ffb3c6', '#cc00ff', '#ffffff'];
                        let color = colors[Math.floor(Math.random() * colors.length)];
                        
                        particlesArray.push(new Particle(posX, posY, color));
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (isRevealed) {
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update();
                }
            }
        }

        btn.addEventListener('click', () => {
            btn.style.opacity = '0';
            btn.style.transform = 'scale(2)';
            btn.style.pointerEvents = 'none';

            setTimeout(() => {
                isRevealed = true;
                initParticles();
                hint.style.opacity = '1';
                
                setTimeout(() => {
                    stickerContainer.style.opacity = '1';
                }, 2000); 

            }, 600);
        });

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(isRevealed) {
                initParticles();
            }
        });

        animate();
    </script>
</body>
</html>
